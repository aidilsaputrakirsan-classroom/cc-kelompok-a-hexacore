worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Optimasi DevOps: Mendukung upload file bukti denda dan cover buku hingga 20MB
    client_max_body_size 20M;

    # Konfigurasi Rate Limiting (Keamanan Infrastruktur)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    upstream auth_service {
        server auth-service:8001;
    }

    upstream library_service {
        server library-service:8002;
    }

    upstream frontend_service {
        server frontend:80;
    }

    server {
        listen 80;
        server_name localhost;

        # ==================== LAYANAN AUTHENTICATION (MICROSERVICE 1) ====================
        # Menangani /auth, /auth/login, /auth/register, /auth/logout secara terpusat
        location /auth/ {
            limit_req zone=auth_limit burst=15 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /users {
            limit_req zone=general_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /verify {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /team {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================== LAYANAN UTAMA PERPUSTAKAAN (MICROSERVICE 2) ====================
        location /books {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://library_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /categories {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://library_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /genres {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://library_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /transactions {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://library_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /items {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://library_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /fines {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://library_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /upload {
            proxy_pass http://library_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /static {
            proxy_pass http://library_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Global health check route
        location /health {
            proxy_pass http://library_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ==================== INDEPENDENT MONITORING & HEALTH ROUTING ====================
        # Digunakan oleh StatusPage.jsx Frontend untuk memantau kluster microservices secara mandiri
        location /auth/health {
            proxy_pass http://auth_service/health;
            proxy_set_header Host $host;
        }

        location /auth/metrics {
            proxy_pass http://auth_service/metrics;
            proxy_set_header Host $host;
        }

        location /library/health {
            proxy_pass http://library_service/health;
            proxy_set_header Host $host;
        }

        location /library/metrics {
            proxy_pass http://library_service/metrics;
            proxy_set_header Host $host;
        }

        # ==================== FRONTEND STATIC SERVER ====================
        location / {
            limit_req zone=general_limit burst=50 nodelay;
            proxy_pass http://frontend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Kustomisasi Error Response JSON saat terkena Rate Limiting (Tugas Nilai Tambahan Komponen C)
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"status": 429, "error": "Too many requests", "message": "Rate limit exceeded. Please throttle your requests and try again later."}';
        }
    }
}