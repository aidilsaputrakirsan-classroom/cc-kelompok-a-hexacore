services:
  # ==================== DATABASE: AUTH ====================
  auth-db:
    image: postgres:16-alpine
    container_name: lentera-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    networks:
      - lentera_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== DATABASE: ITEM/LIBRARY ====================
  item-db:
    image: postgres:16-alpine
    container_name: lentera-item-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: item_db
    ports:
      - "5434:5432"
    volumes:
      - item_pgdata:/var/lib/postgresql/data
    networks:
      - lentera_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d item_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== AUTH SERVICE ====================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: lentera-auth-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'       # Batasi maksimal 50% CPU
          memory: 256M       # Batasi maksimal 256MB RAM
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:postgres@auth-db:5432/auth_db
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
      - ALLOWED_ORIGINS=http://localhost,http://localhost:3000,http://localhost:5173
      - SERVICE_NAME=auth-service
      - LOG_LEVEL=INFO
    ports:
      - "8001:8001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "auth-service"
    networks:
      - lentera_net
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"] # Sesuaikan endpoint health check backend-mu
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ==================== LIBRARY SERVICE ====================
  library-service:
    build:
      context: ./services/library-service
      dockerfile: Dockerfile
    container_name: lentera-library-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:postgres@item-db:5432/item_db
      - AUTH_SERVICE_URL=http://auth-service:8001
      - ALLOWED_ORIGINS=http://localhost,http://localhost:3000,http://localhost:5173
      - SERVICE_NAME=library-service
      - LOG_LEVEL=INFO
    ports:
      - "8002:8002"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "library-service"
    volumes:
      - ./services/library-service/static:/app/static
    networks:
      - lentera_net
    depends_on:
      item-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_AUTH_API_URL=http://localhost:8001
        - VITE_LIBRARY_API_URL=http://localhost:8002
    container_name: lentera-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    ports:
      - "3000:80"
    networks:
      - lentera_net
    depends_on:
      - auth-service
      - library-service

  # ==================== NGINX API GATEWAY ====================
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: lentera-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    ports:
      - "80:80"
    networks:
      - lentera_net
    depends_on:
      auth-service:
        condition: service_healthy
      library-service:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  auth_pgdata:
    name: lentera-auth-pgdata
  item_pgdata:
    name: lentera-item-pgdata

networks:
  lentera_net:
    name: lentera-network
