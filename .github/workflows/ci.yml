# ==============================================
# CI Pipeline — Hexacore
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
# 
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OPTIMASI DEVOPS: Cancel run lama jika ada push baru (Save resources!)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # JOB 1: Test Backend
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10 # OPTIMASI DEVOPS: Gagal otomatis jika macet 10 menit
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 🧪 Run tests with coverage
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=50

  # ================================
  # JOB 2: Test Frontend
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10 # OPTIMASI DEVOPS
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: 📥 Install dependencies
        run: npm ci
      - name: 🧪 Run tests
        run: npm test

  # ================================
  # JOB 3: Build Docker
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend] # Hanya jalan jika test HIJAU
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🐳 Build backend image
        run: docker build -t cloudapp-backend:ci ./backend
      - name: 🐳 Build frontend image
        run: docker build -t cloudapp-frontend:ci ./frontend
      - name: ✅ Build success
        run: echo "✅ All Docker images built successfully!"