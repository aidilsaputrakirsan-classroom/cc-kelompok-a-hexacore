# ==============================================
# CI Pipeline — Hexacore
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
# 
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images
# 4. deploy: Deploy ke Railway (Hanya saat merge ke main)

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OPTIMASI DEVOPS: Cancel run lama jika ada push baru (Save resources!)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # JOB 1: Test Backend
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10 # OPTIMASI DEVOPS: Gagal otomatis jika macet 10 menit
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 🧪 Run tests with coverage
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=50

  # ================================
  # JOB 2: Test Frontend
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10 # OPTIMASI DEVOPS
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: 📥 Install dependencies
        run: npm ci --include=optional
      - name: 🧪 Run tests
        run: npm test

  # ================================
  # JOB 3: Build Docker
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend] # Hanya jalan jika test HIJAU
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🐳 Build backend image
        run: docker build -t cloudapp-backend:ci ./backend
      - name: 🐳 Build frontend image
        run: docker build -t cloudapp-frontend:ci ./frontend
      - name: ✅ Build success
        run: echo "✅ All Docker images built successfully!"

  # ================================
  # JOB 4: Deploy ke Railway & Health Check (TUGAS TERSTRUKTUR)
  # ================================
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # ↑ HANYA deploy saat push/merge ke main (bukan saat PR)

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd backend
          railway up --service backend --detach

      - name: 🚀 Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd frontend
          railway up --service frontend --detach

      # OTOMASI HEALTH CHECK (Tugas Spesifik Lead DevOps)
      - name: 🏥 Health check
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30
          
          # ⚠️ GANTI 'xxx' di bawah ini dengan subdomain Railway asli tim kamu nanti!
          HEALTH_URL="https://cloudapp-backend-xxx.up.railway.app/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL)
          
          if [ "$HTTP_STATUS" == "200" ]; then
            echo "✅ Health check passed! (HTTP $HTTP_STATUS)"
          else
            echo "❌ Health check FAILED! (HTTP $HTTP_STATUS)"
            echo "Check Railway dashboard for logs."
            exit 1
          fi

      - name: ✅ Deploy complete
        run: |
          echo "✅ Deployment successful!"
          echo "Backend: https://cloudapp-backend-xxx.up.railway.app"
          echo "Frontend: https://cloudapp-frontend-xxx.up.railway.app"